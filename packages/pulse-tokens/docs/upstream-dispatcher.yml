# Copy this file into the UPSTREAM repo (prateeksainitap/pulsedesignsystem)
# at `.github/workflows/notify-pulse-tokens.yml`.
#
# Whenever Zeroheight (or anyone) commits to /tokens on main, it pokes the
# downstream pulse-tokens repo via repository_dispatch, triggering an
# immediate sync + publish.

name: Notify pulse-tokens

on:
  push:
    branches: [main]
    paths:
      - 'tokens/**'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch tokens-updated event
        env:
          # PAT with `repo` scope on the downstream repo.
          # Store as a secret named DOWNSTREAM_DISPATCH_TOKEN in this (upstream) repo.
          GH_TOKEN: ${{ secrets.DOWNSTREAM_DISPATCH_TOKEN }}
        run: |
          curl -sSf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/your-org/pulse-tokens/dispatches \
            -d '{"event_type":"tokens-updated","client_payload":{"sha":"${{ github.sha }}"}}'
